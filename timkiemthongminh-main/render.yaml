services:
  - type: web
    name: news-semantic-search-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: project/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: HF_EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: news_articles
      - key: QDRANT_VECTOR_SIZE
        value: "1024"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SEARCH_TOP_K
        value: "10"
      - key: SEARCH_CANDIDATE_K
        value: "30"
      - key: CACHE_TTL_SECONDS
        value: "1800"
      - key: LOG_LEVEL
        value: INFO

# Frontend (project/frontend) deploy riêng trên Vercel — không nằm trong
# render.yaml vì Render chỉ host backend. Trên Vercel: Root Directory =
# `project/frontend`, framework Vite được tự nhận diện (xem vercel.json).
